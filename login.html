<!DOCTYPE html>
<html lang="en" data-theme="light" dir="ltr">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Client Login — WedINv</title>
  <link rel="stylesheet" href="css/style.css">
  <link rel="icon" href="https://w7.pngwing.com/pngs/67/171/png-transparent-wedding-logo-wedding-bride-groom-silhouette.png">
</head>

<body>
  <div class="cursor"></div>
  <div class="cursor-follower"></div>

  <div class="auth-page">


    <!-- FORM SIDE -->
    <div class="auth-form-wrap">
      <div class="auth-form">
        <div style="display:flex;justify-content:center;margin-bottom:32px">
          <a href="index.html" class="logo">
            <img src="https://w7.pngwing.com/pngs/67/171/png-transparent-wedding-logo-wedding-bride-groom-silhouette.png" alt="WEDINV Logo" class="logo-img">
            WED<span>INV</span>
          </a>
        </div>
        <h1>Client Portal</h1>
        <p class="subtitle">Sign in to continue your beautiful journey</p>

        <form onsubmit="handleLogin(event)">
          <div class="form-group">
            <label>Email Address</label>
            <input type="email" placeholder="hello@example.com" required>
          </div>
          <div class="form-group">
            <label>Password</label>
            <input type="password" placeholder="Enter your password" required>
          </div>
          <div
            style="display:flex;align-items:center;justify-content:space-between;margin-bottom:28px;font-size:0.75rem;width:100%">
            <label
              style="display:flex;align-items:center;gap:8px;cursor:pointer;text-transform:none;letter-spacing:0;font-size:0.75rem">
              <input type="checkbox" style="width:auto;border:1px solid rgba(var(--accent-rgb),0.4)"> Remember me
            </label>
            <a href="#" style="color:var(--accent);font-size:0.75rem">Forgot password?</a>
          </div>
          <button type="submit" class="btn-dark" style="width:100%;border:none;cursor:pointer;padding:16px"
            id="login-btn">Sign In to Portal</button>
        </form>

        <div class="social-auth">
          <span class="social-auth-label">— or continue with —</span>
          <div class="social-auth-btns">
            <button class="social-btn" title="Sign in with Google">
              <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                <path
                  d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"
                  fill="#4285F4" />
                <path
                  d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"
                  fill="#34A853" />
                <path
                  d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"
                  fill="#FBBC05" />
                <path
                  d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"
                  fill="#EA4335" />
              </svg>
            </button>
            <button class="social-btn" title="Sign in with Email">
              <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                <path d="M20 4H4c-1.1 0-2 .9-2 2v12c0 1.1.9 2 2 2h16c1.1 0 2-.9 2-2V6c0-1.1-.9-2-2-2z" fill="#EA4335"
                  opacity="0.1" />
                <path d="M22 6c0-1.1-.9-2-2-2H4c-1.1 0-2 .9-2 2l10 6 10-6z" fill="#EA4335" />
                <path d="M2 6v12c0 1.1.9 2 2 2h16c1.1 0 2-.9 2-2V6l-10 6L2 6z" fill="#C5221F" />
              </svg>
            </button>
          </div>
        </div>

        <p style="text-align:center;margin-top:32px;font-size:0.82rem;opacity:0.6">
          Not a client yet? <a href="register.html">Begin your journey →</a>
        </p>

        <div style="margin-top:40px;padding-top:28px;border-top:1px solid rgba(var(--accent-rgb),0.2)">
        </div>
      </div>
    </div>
  </div>

  <script src="js/main.js"></script>
  <script>
    function handleLogin(e) {
      e.preventDefault();
      const btn = document.getElementById('login-btn');
      btn.textContent = 'Signing in...';
      btn.style.opacity = '0.7';
      setTimeout(() => {
        btn.textContent = 'Welcome back! ✦';
        btn.style.background = '#b8976a';
        btn.style.opacity = '1';
      }, 1500);
    }
  </script>
</body>

</html>
