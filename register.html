<!DOCTYPE html>
<html lang="en" data-theme="light" dir="ltr">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Client Registration — WedINv</title>
<link rel="stylesheet" href="css/style.css">
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' rx='20' fill='%231a1209'/><path d='M20 80 Q 40 20 50 50 Q 60 80 80 20' stroke='%23b8976a' stroke-width='8' fill='none' stroke-linecap='round' stroke-linejoin='round'/></svg>">
</head>
<body>
<div class="cursor"></div><div class="cursor-follower"></div>

<div class="auth-page">
  

  <!-- FORM SIDE -->
  <div class="auth-form-wrap">
    <div class="auth-form">
      <div style="display:flex;justify-content:center;margin-bottom:32px">
        <a href="index.html" class="logo">
          <svg viewBox="0 0 100 100" class="logo-svg" fill="none" stroke="currentColor" stroke-width="6" stroke-linecap="round" stroke-linejoin="round" xmlns="http://www.w3.org/2000/svg">
            <path d="M20 80 Q 40 20 50 50 Q 60 80 80 20" />
          </svg>
          Wed<span>Inv</span>
        </a>
      </div>
      <h1>Create Account</h1>
      <p class="subtitle">Join our exclusive client community</p>

      <form onsubmit="handleRegister(event)">
        <div class="form-group">
          <label>First Name</label>
          <input type="text" placeholder="Enter your first name" required>
        </div>
        <div class="form-group">
          <label>Last Name</label>
          <input type="text" placeholder="Enter your last name" required>
        </div>
        <div class="form-group">
          <label>Email Address</label>
          <input type="email" placeholder="hello@example.com" required>
        </div>
        <div class="form-group">
          <label>Select your role...</label>
          <select required>
            <option value="">Select your role...</option>
            <option value="bride">Bride</option>
            <option value="groom">Groom</option>
            <option value="planner">Wedding Planner</option>
            <option value="family">Family Member</option>
            <option value="other">Other</option>
          </select>
        </div>
        <div class="form-group">
          <label>Password</label>
          <input type="password" placeholder="Create a strong password" required>
        </div>
        <div class="form-group">
          <label>Confirm Password</label>
          <input type="password" placeholder="Repeat password" required>
        </div>
        <div style="display:flex;align-items:center;gap:8px;margin-bottom:20px;font-size:0.78rem">
          <input type="checkbox" id="terms" required style="width:auto;border:1px solid rgba(var(--accent-rgb),0.4)">
          <label for="terms" style="cursor:pointer;text-transform:none;letter-spacing:0">
            I agree <a href="#" style="color:var(--accent)">Terms of Service</a> & <a href="#" style="color:var(--accent)">Privacy Policy</a>
          </label>
        </div>
        <button type="submit" class="btn-dark" style="width:100%;border:none;cursor:pointer;padding:16px" id="register-btn">Create Account</button>
      </form>

      <div class="social-auth">
        <span class="social-auth-label">— or sign up with —</span>
        <div class="social-auth-btns">
          <button class="social-btn" title="Sign up with Google">
            <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
              <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/>
              <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
              <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/>
              <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>
            </svg>
          </button>
          <button class="social-btn" title="Sign up with Email">
            <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
              <path d="M20 4H4c-1.1 0-2 .9-2 2v12c0 1.1.9 2 2 2h16c1.1 0 2-.9 2-2V6c0-1.1-.9-2-2-2z" fill="#EA4335" opacity="0.1"/>
              <path d="M22 6c0-1.1-.9-2-2-2H4c-1.1 0-2 .9-2 2l10 6 10-6z" fill="#EA4335"/>
              <path d="M2 6v12c0 1.1.9 2 2 2h16c1.1 0 2-.9 2-2V6l-10 6L2 6z" fill="#C5221F"/>
            </svg>
          </button>
        </div>
      </div>

      <p style="text-align:center;margin-top:32px;font-size:0.82rem;opacity:0.6">
        Already have an account? <a href="login.html">Sign in →</a>
      </p>
      

      <div style="margin-top:40px;padding-top:28px;border-top:1px solid rgba(var(--accent-rgb),0.2)">
      </div>
    </div>
  </div>
</div>

<script src="js/main.js"></script>
<script>
function handleRegister(e) {
  e.preventDefault();
  
  // Get form values
  const password = document.querySelector('input[type="password"]').value;
  const confirmPassword = document.querySelectorAll('input[type="password"]')[1].value;
  
  // Validate passwords match
  if (password !== confirmPassword) {
    alert('Passwords do not match. Please try again.');
    return;
  }
  
  const btn = document.getElementById('register-btn');
  btn.textContent = 'Creating account...';
  btn.style.opacity = '0.7';
  
  setTimeout(() => {
    btn.textContent = 'Welcome to WedINv! ✦';
    btn.style.background = '#b8976a';
    btn.style.opacity = '1';
    
    // Redirect to login after successful registration
    setTimeout(() => {
      window.location.href = 'login.html';
    }, 2000);
  }, 1500);
}
</script>
</body>
</html>
